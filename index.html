<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#243c38">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Claris">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-180.png">
    <link rel="icon" href="icons/claris-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css?v=20260516-claris4">
    <title>Claris / クラリス</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"><span>C</span></span>
          <div class="brand-copy">
            <span id="appName" class="app-name">Claris / クラリス</span>
            <h1 id="viewTitle">今日</h1>
          </div>
        </div>
        <div class="top-actions">
          <button class="icon-button" type="button" data-action="open-settings" aria-label="設定">⋯</button>
        </div>
      </header>

      <main id="view" class="view" tabindex="-1"></main>

      <nav class="bottom-nav" aria-label="主要画面">
        <button type="button" data-tab="calendar" aria-label="カレンダー">
          <span class="nav-icon" aria-hidden="true">□</span>
          <span>カレンダー</span>
        </button>
        <button type="button" data-tab="tasks" aria-label="タスク">
          <span class="nav-icon" aria-hidden="true">≡</span>
          <span>タスク</span>
        </button>
        <button type="button" data-tab="today" class="today-tab" aria-label="今日">
          <span class="nav-icon" aria-hidden="true">◎</span>
          <span>今日</span>
        </button>
        <button type="button" data-tab="memos" aria-label="メモ">
          <span class="nav-icon" aria-hidden="true">✎</span>
          <span>メモ</span>
        </button>
        <button type="button" data-tab="policies" aria-label="方針">
          <span class="nav-icon" aria-hidden="true">◇</span>
          <span>方針</span>
        </button>
      </nav>

      <button id="addButton" class="fab" type="button" data-action="open-add" aria-label="追加">＋</button>
    </div>

    <dialog id="entityDialog" class="sheet-dialog"></dialog>
    <dialog id="conflictDialog" class="sheet-dialog conflict-dialog"></dialog>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js?v=20260516-claris4" defer></script>
  </body>
</html>
